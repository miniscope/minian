# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc
  jobs:
    # Fetch tags so pdm-backend's SCM versioning resolves (RTD clones shallow).
    post_checkout:
      - git fetch --tags --unshallow || git fetch --tags

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - doc
