name: pytest

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  test-and-coverage:
    name: Test and Cov py ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        # windows-latest is temporarily dropped: pymetis has no Windows
        # wheel on PyPI and won't build from source (its bundled METIS
        # GKlib requires the POSIX header sys/resource.h). Restore it once
        # pymetis is removed from the dependency list.
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up ffmpeg
        # ffmpeg-python is only a wrapper; the tests/notebooks need the
        # actual ffmpeg/ffprobe binaries (previously provided by conda).
        # Installed via the OS package manager so it works on the arm64
        # macOS runners too.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          fi
      - name: Install minian and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]' pytest-cov ruff
      - name: Lint with ruff
        run: |
          ruff check minian
      - name: Configure dask cluster and disable interactive plots
        # Run the pipeline notebook headless (no interactive holoviews/panel
        # widgets) and with a single dask worker sized to ~75% of the runner's
        # actual RAM. Multiple small (4GB) workers thrash and lose dependencies
        # during update_temporal on the newer dask/numpy stack; one fat worker
        # with room to spare gets through without spilling.
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            TOTAL_GB=$(( $(sysctl -n hw.memsize) / 1024 / 1024 / 1024 ))
          else
            TOTAL_GB=$(( $(awk '/MemTotal/ {print $2}' /proc/meminfo) / 1024 / 1024 ))
          fi
          echo "Runner has ${TOTAL_GB}GB RAM; using 1 dask worker @ ~75%"
          echo "MINIAN_NWORKERS=1" >> "$GITHUB_ENV"
          echo "MINIAN_MEM_LIMIT=$(( TOTAL_GB * 3 / 4 ))GB" >> "$GITHUB_ENV"
          echo "MINIAN_INTERACTIVE=False" >> "$GITHUB_ENV"
      - name: Run tests and collect coverage
        run: |
          pytest -v --color=yes --cov=minian --pyargs minian
          mkdir -p artifact
          cp -r img artifact/img
      - name: Generate xml coverage report
        if: ${{ runner.os == 'Linux' }}
        run: |
          coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload notebook artifacts
        uses: actions/upload-artifact@v4
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.12' }}
        with:
          name: notebooks-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifact
      - name: Trigger RTDs build
        uses: dfm/rtds-action@v1
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.12' }}
        with:
          webhook_url: ${{ secrets.RTDS_WEBHOOK_URL }}
          webhook_token: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          commit_ref: ${{ github.ref }}
