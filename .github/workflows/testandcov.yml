name: pytest

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  prefetch-data:
    # Download the demo datasets once per OS and cache them so the test matrix
    # below restores from cache instead of re-downloading per job.
    name: Prefetch demo data (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache demo datasets
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/minian
            ~/Library/Caches/minian
            ~/AppData/Local/minian/minian/Cache
          key: minian-demo-data-${{ runner.os }}-${{ hashFiles('minian/data/_registry.py') }}
      - name: Download demo datasets (once per OS)
        if: steps.cache.outputs.cache-hit != 'true'
        # Use the real CLI rather than a bespoke prefetch script, so there is a
        # single source of truth for how datasets are fetched. This installs
        # minian (base deps) on a cache miss only.
        run: |
          python -m pip install .
          minian data download --all

  test-and-coverage:
    name: Test and Cov py ${{ matrix.python-version }}, ${{ matrix.os }}
    needs: prefetch-data
    runs-on: ${{ matrix.os }}
    # Healthy runs finish in ~40-60min. This backstop kills a deadlocked job
    # (e.g. a hung dask cluster) in minutes instead of the 6h GitHub ceiling,
    # so a flaky hang frees the runner and reports promptly.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
        # Run only the oldest and newest Python on non-Linux runners to keep
        # CI cost down; Linux runs the full matrix.
        - os: "macos-latest"
          python-version: "3.11"
        - os: "macos-latest"
          python-version: "3.12"
        - os: "windows-latest"
          python-version: "3.11"
        - os: "windows-latest"
          python-version: "3.12"
        - os: "windows-latest"
          python-version: "3.13"
        # TODO: resolve macOS numcodecs pin without 3.14 wheels
        - os: "macos-latest"
          python-version: "3.14"
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up ffmpeg
        # ffmpeg-python is only a wrapper; the tests/notebooks need the
        # actual ffmpeg/ffprobe binaries (previously provided by conda).
        # Installed via the OS package manager so it works on the arm64
        # macOS runners too. Windows uses choco which ships ffmpeg.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          elif [ "$RUNNER_OS" = "Windows" ]; then
            choco install ffmpeg -y
          fi
      - name: Install minian and test dependencies
        run: |
          python -m pip install "pdm>=2.26.9"
          pdm install --with test
      - name: Restore demo datasets
        # Same key as the prefetch-data job; every matrix entry restores instead
        # of re-downloading. On a cache miss the tests fetch on demand.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/minian
            ~/Library/Caches/minian
            ~/AppData/Local/minian/minian/Cache
          key: minian-demo-data-${{ runner.os }}-${{ hashFiles('minian/data/_registry.py') }}
      - name: Run tests and collect coverage
        # Run the full suite (unit + slow notebook runs) on every matrix cell.
        # `pdm run test` deselects `slow` for fast local runs.
        run: |
          pdm run test-all
          mkdir -p artifact
          cp -r minian/notebooks/pipeline/assets artifact/assets
      - name: Generate xml coverage report
        if: ${{ runner.os == 'Linux' }}
        run: |
          pdm run coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload notebook artifacts
        uses: actions/upload-artifact@v4
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.10' }}
        with:
          name: notebooks-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifact
