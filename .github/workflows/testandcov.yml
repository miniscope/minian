name: pytest

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  test-and-coverage:
    name: Test and Cov py ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is dropped: pymetis has no PyPI Windows wheel and
        # its sdist won't build on Windows (bundled METIS GKlib requires the
        # POSIX header sys/resource.h). Restoring it through conda-forge is
        # tracked as follow-up -- conda env activation on Windows runners
        # interacts poorly with the default GHA shell and bypasses mamba/pip
        # invocations.
        os: ["ubuntu-latest", "macos-latest"]
        # Scope for this PR: Python 3.10 across both OS. Extending the matrix
        # to 3.11+ is tracked as follow-up -- newer Pythons hit missing
        # upstream wheels (numcodecs cp311+ on macOS, etc.).
        python-version: ["3.10"]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up ffmpeg
        # ffmpeg-python is only a wrapper; the tests/notebooks need the
        # actual ffmpeg/ffprobe binaries (previously provided by conda).
        # Installed via the OS package manager so it works on the arm64
        # macOS runners too.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          fi
      - name: Install minian and test dependencies
        run: |
          python -m pip install pdm
          pdm install --with test
      - name: Run tests and collect coverage
        run: |
          pdm run test
          mkdir -p artifact
          cp -r img artifact/img
      - name: Generate xml coverage report
        if: ${{ runner.os == 'Linux' }}
        run: |
          pdm run coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload notebook artifacts
        uses: actions/upload-artifact@v4
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.10' }}
        with:
          name: notebooks-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifact
