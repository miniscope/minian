name: pytest

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  test-and-coverage:
    name: Test and Cov py ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # pymetis has no Windows wheel on PyPI and its sdist won't build on
        # Windows (bundled METIS GKlib requires POSIX `sys/resource.h`); the
        # Windows job installs it via conda-forge instead (see steps below).
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        # Scope for this PR: Python 3.10 across all three OS. Extending the
        # matrix to 3.11+ is tracked as follow-up -- newer Pythons hit
        # missing upstream wheels (numcodecs cp311+ on macOS, etc.) and
        # the Windows conda env has additional rough edges on cp314.
        python-version: ["3.10"]
    defaults:
      run:
        # On Windows the conda env from setup-miniconda needs to be on PATH;
        # `bash -el {0}` triggers conda's profile script. On Linux/macOS the
        # `-l` flag is a no-op for our purposes.
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }} (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }} via conda-forge (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          miniforge-version: latest
          channels: conda-forge
          activate-environment: minian-ci
          auto-activate-base: false
          use-mamba: true

      - name: Install native deps via conda (Windows only)
        if: ${{ runner.os == 'Windows' }}
        # pymetis: no PyPI Windows wheel (see matrix comment).
        # ffmpeg: ships actual binaries; matches the Linux/macOS branch below.
        run: |
          mamba install -y pymetis ffmpeg

      - name: Set up ffmpeg (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        # ffmpeg-python is only a wrapper; the tests/notebooks need the
        # actual ffmpeg/ffprobe binaries (previously provided by conda).
        # Installed via the OS package manager so it works on the arm64
        # macOS runners too.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          fi

      - name: Install minian and test dependencies
        # On Windows we run inside a conda env that already has pymetis +
        # ffmpeg; pdm would install into its own venv (or __pypackages__/)
        # outside the conda env, leaving the test subprocesses unable to
        # find ffmpeg.exe. Use plain pip so everything lives in one
        # environment. Linux/macOS keep the pdm/lockfile flow.
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            python -m pip install ".[test]"
          else
            python -m pip install pdm
            pdm install --with test
          fi

      - name: Run tests and collect coverage
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            python -m pytest
          else
            pdm run test
          fi
          mkdir -p artifact
          cp -r img artifact/img

      - name: Generate xml coverage report
        if: ${{ runner.os == 'Linux' }}
        run: |
          pdm run coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload notebook artifacts
        uses: actions/upload-artifact@v4
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.12' }}
        with:
          name: notebooks-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifact
