name: pytest

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  test-and-coverage:
    name: Test and Cov py ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
        # Run only first and last versions on non-linux
        - os: "macos-latest"
          python-version: "3.11"
        - os: "macos-latest"
          python-version: "3.12"
        # TODO: resolve macOS numcodecs pin without 3.14 wheels
        - os: "macos-latest"
          python-version: "3.14"
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up ffmpeg
        # ffmpeg-python is only a wrapper; the tests/notebooks need the
        # actual ffmpeg/ffprobe binaries (previously provided by conda).
        # Installed via the OS package manager so it works on the arm64
        # macOS runners too.
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          fi
      - name: Install minian and test dependencies
        run: |
          python -m pip install pdm
          pdm install --with test
      - name: Run tests and collect coverage
        run: pdm run test
      - name: Generate xml coverage report
        if: ${{ runner.os == 'Linux' }}
        run: |
          pdm run coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ runner.os == 'Linux' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  notebook-tests:
    name: notebooks · py ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
        # Run only first and last versions on non-linux
        - os: "macos-latest"
          python-version: "3.11"
        - os: "macos-latest"
          python-version: "3.12"
        # TODO: resolve macOS numcodecs pin without 3.14 wheels
        - os: "macos-latest"
          python-version: "3.14"
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up ffmpeg
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          fi
      - name: Install minian and test dependencies
        run: |
          python -m pip install pdm
          pdm install --with test
      - name: Run notebook tests
        run: |
          mkdir -p artifact
          cp -r img artifact/img
          pdm run test-notebooks
      - name: Upload notebook artifacts
        uses: actions/upload-artifact@v4
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.10' }}
        with:
          name: notebooks-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifact
