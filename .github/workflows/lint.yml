name: lint

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff Linting
        run: ruff check minian

  lock:
    name: lockfile current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: install pdm
        # exclude-newer in [tool.pdm.resolution] requires PDM >= 2.26.9; see pyproject.toml
        run: python -m pip install "pdm>=2.26.9"
      - name: check lockfile
        run: pdm lock --check --with :all

  notebooks-stripped:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install nbstripout
        run: python -m pip install nbstripout
      - name: Verify committed notebooks have no outputs
        run: |
          if ! find minian/notebooks -name '*.ipynb' -print0 | xargs -0 nbstripout --verify; then
            echo "::error::Committed notebook(s) still contain outputs or execution counts."
            echo "Fix locally, then re-commit:"
            echo "  python -m pip install pre-commit"
            echo "  pre-commit install                  # enable the hook for future commits"
            echo "  pre-commit run nbstripout --all-files"
            echo "Or strip directly:  nbstripout minian/notebooks/*.ipynb"
            exit 1
          fi
