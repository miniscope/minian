name: lint

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff Linting
        run: ruff check minian

  lock:
    name: lockfile current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: install pdm
        run: python -m pip install pdm
      - name: check lockfile
        run: pdm lock --check --with :all