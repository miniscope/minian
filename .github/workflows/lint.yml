name: lint

# Run this workflow every time for pull requests and pushes to master and dev branch
on:
  push:
    branches:
      - master
      - dev
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Ruff Linting
        run: ruff check
      - name: Ruff Formatting
        run: ruff format --check

  lock:
    name: lockfile current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: install pdm
        # exclude-newer in [tool.pdm.resolution] requires PDM >= 2.26.9; see pyproject.toml
        run: python -m pip install "pdm>=2.26.9"
      - name: check lockfile
        run: pdm lock --check --with :all

  pre-commit:
    # Runs the hooks in .pre-commit-config.yaml (currently nbstripout, which
    # verifies committed notebooks carry no outputs). Configuring the check
    # only in pre-commit means `pre-commit run --all-files` locally matches CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
