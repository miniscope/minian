name: notebook tests

# Slow end-to-end notebook checks — not part of default pytest (see scripts/).
# Aside: ~30min+ per notebook. To run only on demand, comment push/pull_request
# below and use workflow_dispatch instead (or locally: `pdm run test-notebooks`).
on:
  push:
    branches:
      - master
      - dev
  pull_request:
  workflow_dispatch:
  # Manual-only alternative (comment out push/pull_request above):
  # on:
  #   workflow_dispatch:

jobs:
  notebook-tests:
    name: notebooks · py ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10"]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up ffmpeg
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ffmpeg
          fi

      - name: Install minian and test dependencies
        run: |
          python -m pip install pdm
          pdm install --with test

      - name: Run notebook checks
        run: |
          mkdir -p artifact
          cp -r img artifact/img
          pdm run test-notebooks

      - name: Upload notebook artifacts
        uses: actions/upload-artifact@v4
        with:
          name: notebooks-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifact
